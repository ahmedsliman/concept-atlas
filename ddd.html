<script>
const DATA = {
  payment: {
    title: "Payment",
    tag: "Aggregate Root", tagColor: "#4a7fb5", tagBg: "#1e3a5f",
    what: "The central aggregate in Billing. Owns PaymentMethod and LineItems. Enforces consistency rules like 'a payment cannot be refunded after 30 days'. All changes go through Payment — no direct mutation of children.",
    rules: ["Only one PaymentMethod allowed per Payment", "Total must equal sum of LineItems", "State transitions: Pending → Authorized → Captured → Refunded", "Raise PaymentCreated event on creation"],
    code: `<?php
final class Payment
{
    private PaymentId $id;
    private Money $total;
    private PaymentStatus $status;
    private PaymentMethod $method;
    /** @var LineItem[] */
    private array $lineItems = [];
    private array $domainEvents = [];

    public function __construct(
        PaymentId $id,
        Money $total,
        PaymentMethod $method
    ) {
        $this->id = $id;
        $this->total = $total;
        $this->status = PaymentStatus::PENDING;
        $this->method = $method;
        $this->domainEvents[] = new PaymentCreated($id, $total);
    }

    public function capture(): void
    {
        if (!$this->status->equals(PaymentStatus::AUTHORIZED)) {
            throw new \\DomainException('Only authorized payments can be captured');
        }
        $this->status = PaymentStatus::CAPTURED;
    }

    public function pullDomainEvents(): array
    {
        $events = $this->domainEvents;
        $this->domainEvents = [];
        return $events;
    }
}`
  },
  paymentmethod: {
    title: "PaymentMethod",
    tag: "Entity", tagColor: "#4a9e8e", tagBg: "#1a3a30",
    what: "An Entity inside the Payment aggregate. Has its own identity (card token, bank account ID) but can only be accessed through the Payment aggregate root — never directly.",
    rules: ["Has a unique PaymentMethodId", "Must belong to a Payment", "Not accessible from outside the aggregate directly", "Card details never stored — only tokenized reference"],
    code: `<?php
final class PaymentMethod
{
    private PaymentMethodId $id;
    private string $token;      // Stripe/PSP token, never raw card
    private string $type;       // 'card', 'bank_transfer'

    public function __construct(
        PaymentMethodId $id,
        string $token,
        string $type
    ) {
        if (empty($token)) {
            throw new \\DomainException('Token cannot be empty');
        }
        $this->id = $id;
        $this->token = $token;
        $this->type = $type;
    }

    public function getToken(): string
    {
        return $this->token;
    }
}`
  },
  lineitem: {
    title: "LineItem",
    tag: "Entity", tagColor: "#4a9e8e", tagBg: "#1a3a30",
    what: "Represents a single chargeable item within a Payment. Has identity but lives inside the Payment aggregate boundary.",
    rules: ["Quantity must be > 0", "Price must be non-negative", "Cannot exist outside a Payment"],
    code: `<?php
final class LineItem
{
    private LineItemId $id;
    private string $description;
    private Money $unitPrice;
    private int $quantity;

    public function __construct(
        LineItemId $id,
        string $description,
        Money $unitPrice,
        int $quantity
    ) {
        if ($quantity <= 0) {
            throw new \\DomainException('Quantity must be positive');
        }
        $this->id = $id;
        $this->description = $description;
        $this->unitPrice = $unitPrice;
        $this->quantity = $quantity;
    }

    public function subtotal(): Money
    {
        return $this->unitPrice->multiply($this->quantity);
    }
}`
  },
  money: {
    title: "Money",
    tag: "Value Object", tagColor: "#7c6fb5", tagBg: "#231e3a",
    what: "Immutable Value Object representing an amount + currency. Two Money instances with the same amount and currency are equal. No identity. Replacing it creates a new instance.",
    rules: ["Immutable — all operations return new instances", "Amount stored in minor units (cents) to avoid float issues", "Cannot add Money of different currencies", "Equality based on amount + currency"],
    code: `<?php
final class Money
{
    public function __construct(
        private readonly int $amountInCents,  // 1000 = $10.00
        private readonly Currency $currency
    ) {
        if ($amountInCents < 0) {
            throw new \\DomainException('Amount cannot be negative');
        }
    }

    public function add(Money $other): self
    {
        if (!$this->currency->equals($other->currency)) {
            throw new \\DomainException('Cannot add different currencies');
        }
        return new self(
            $this->amountInCents + $other->amountInCents,
            $this->currency
        );
    }

    public function multiply(int $factor): self
    {
        return new self($this->amountInCents * $factor, $this->currency);
    }

    public function equals(Money $other): bool
    {
        return $this->amountInCents === $other->amountInCents
            && $this->currency->equals($other->currency);
    }
}`
  },
  currency: {
    title: "Currency",
    tag: "Value Object", tagColor: "#7c6fb5", tagBg: "#231e3a",
    what: "Immutable Value Object wrapping an ISO 4217 currency code. Prevents invalid currencies from entering the domain.",
    rules: ["Must be a valid ISO 4217 code", "Immutable", "Equality by code"],
    code: `<?php
final class Currency
{
    private const VALID = ['USD', 'EUR', 'GBP', 'AED', 'SAR'];

    public function __construct(private readonly string $code)
    {
        if (!in_array(strtoupper($code), self::VALID, true)) {
            throw new \\DomainException("Invalid currency: {$code}");
        }
        $this->code = strtoupper($code);
    }

    public function equals(Currency $other): bool
    {
        return $this->code === $other->code;
    }

    public function __toString(): string
    {
        return $this->code;
    }
}`
  },
  paymentstatus: {
    title: "PaymentStatus",
    tag: "Value Object", tagColor: "#7c6fb5", tagBg: "#231e3a",
    what: "An enum-like Value Object representing the lifecycle state of a Payment. Using a VO instead of a plain string makes transitions type-safe.",
    rules: ["Valid values: PENDING, AUTHORIZED, CAPTURED, FAILED, REFUNDED", "Immutable — state changes create new Payment, not mutate status", "Drives business rule checks (can only refund CAPTURED)"],
    code: `<?php
final class PaymentStatus
{
    public const PENDING    = 'pending';
    public const AUTHORIZED = 'authorized';
    public const CAPTURED   = 'captured';
    public const FAILED     = 'failed';
    public const REFUNDED   = 'refunded';

    private static array $valid = [
        self::PENDING, self::AUTHORIZED,
        self::CAPTURED, self::FAILED, self::REFUNDED,
    ];

    public function __construct(private readonly string $value)

    private NotificationStatus $status;

    public function send(NotificationSender $sender): void
    {
        if ($this->attempts >= self::MAX_ATTEMPTS) {
            throw new \\DomainException('Max retry attempts exceeded');
        }
        $this->attempts++;

            $sender->send($this->channel, $this->template);
            $this->status = NotificationStatus::sent();
            $this->domainEvents[] = new NotificationSent($this->id);

let selected = null;

function show(id) {
  const d = DATA[id];
  if (!d) return;
  if (selected) {
    const prev = document.getElementById('n-' + selected);
    if (prev) prev.classList.remove('selected');
  }
  selected = id;
  const el = document.getElementById('n-' + id);
  if (el) el.classList.add('selected');

  document.getElementById('panel-title').textContent = d.title;
  document.getElementById('panel').classList.remove('hidden');

  const body = document.getElementById('panel-body');
  body.innerHTML = `
    <span class="tag" style="color:${d.tagColor};background:${d.tagBg}">${d.tag}</span>
    <h3>What is it?</h3>
    <p>${d.what}</p>
    <h3>Rules</h3>
    <ul>${d.rules.map(r=>`<li>${r}</li>`).join('')}</ul>
    <h3>PHP Example</h3>
    <pre>${escHtml(d.code)}</pre>
  `;
}

function closePanel() {
  document.getElementById('panel').classList.add('hidden');
  if (selected) {
    const el = document.getElementById('n-' + selected);
    if (el) el.classList.remove('selected');
    selected = null;
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
