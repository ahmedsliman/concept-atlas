<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Patterns Cheat Sheet</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #0f1117;
  color: #e2e8f0;
  min-height: 100vh;
}

/* ── Header ── */
header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: #0f1117;
  border-bottom: 1px solid #1e2533;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
header h1 { font-size: 16px; font-weight: 700; white-space: nowrap; }
header h1 span { color: #718096; font-weight: 400; font-size: 13px; margin-left: 6px; }

.filters { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn {
  padding: 5px 13px;
  border-radius: 20px;
  border: 1px solid #2d3748;
  background: transparent;
  color: #718096;
  font-size: 12px;
  cursor: pointer;
  font-weight: 500;
  transition: all .15s;
}
.filter-btn:hover { border-color: #4a5568; color: #a0aec0; }
.filter-btn.on { color: #fff; }
.filter-btn.on.all  { border-color: #718096; background: #1e2533; }
.filter-btn.on.c    { border-color: #f6ad55; background: #2a1e0f; color: #f6ad55; }
.filter-btn.on.s    { border-color: #90cdf4; background: #0f1e2e; color: #90cdf4; }
.filter-btn.on.b    { border-color: #b794f4; background: #1a0f2e; color: #b794f4; }

.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
#search {
  padding: 6px 12px;
  background: #141824;
  border: 1px solid #2d3748;
  border-radius: 20px;
  color: #e2e8f0;
  font-size: 12px;
  outline: none;
  width: 180px;
}
#search:focus { border-color: #4a7fb5; }
#progress { font-size: 11px; color: #4a5568; white-space: nowrap; }

/* ── Main layout ── */
main { max-width: 860px; margin: 0 auto; padding: 24px; }

.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #4a5568;
  margin: 28px 0 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid #1e2533;
}

/* ── Cards ── */
.card {
  border: 1px solid #1e2533;
  border-radius: 10px;
  background: #141824;
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color .15s;
}
.card:hover { border-color: #2d3748; }
.card.open  { border-color: #2d3748; }

.card-head {
  padding: 14px 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  user-select: none;
}
.card-head:hover { background: #161d2e; }

.cat-dot {
  width: 9px;
  height: 9px;
  border-radius: 3px;
  flex-shrink: 0;
}

.head-text { flex: 1; min-width: 0; }
.pattern-name {
  font-size: 14px;
  font-weight: 600;
  color: #e2e8f0;
  margin-bottom: 2px;
}
.pattern-intent {
  font-size: 12px;
  color: #718096;
  line-height: 1.4;
}

.head-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.learned-toggle {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: #4a5568;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  border: 1px solid transparent;
  transition: all .15s;
}
.learned-toggle:hover { border-color: #2d3748; color: #a0aec0; }
.learned-toggle input { cursor: pointer; accent-color: #68d391; }
.card.learned .learned-toggle { color: #68d391; }

.chevron {
  color: #4a5568;
  font-size: 12px;
  transition: transform .2s;
}
.card.open .chevron { transform: rotate(180deg); }

/* ── Card body ── */
.card-body {
  display: none;
  border-top: 1px solid #1e2533;
  padding: 18px;
}
.card-body.open { display: block; }

.section-head {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #4a7fb5;
  margin-bottom: 8px;
}

.when-list {
  list-style: none;
  margin-bottom: 18px;
}
.when-list li {
  font-size: 13px;
  color: #a0aec0;
  line-height: 1.5;
  padding: 4px 0 4px 16px;
  position: relative;
}
.when-list li::before {
  content: '›';
  position: absolute;
  left: 0;
  color: #4a5568;
}

/* ── Code tabs ── */
.code-tabs { margin-bottom: 14px; }
.tab-btns { display: flex; gap: 0; margin-bottom: 0; }
.tab-btn {
  padding: 6px 16px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid #2d3748;
  background: #0a0d14;
  color: #4a5568;
  transition: all .15s;
  letter-spacing: .3px;
}
.tab-btn:first-child { border-radius: 6px 0 0 0; }
.tab-btn:last-child  { border-radius: 0 6px 0 0; border-left: none; }
.tab-btn.active-before { background: #2a1010; color: #fc8181; border-color: #5a2020; border-bottom-color: #2a1010; }
.tab-btn.active-after  { background: #0f2a1a; color: #68d391; border-color: #1a5a2a; border-bottom-color: #0f2a1a; }

.code-panel { display: none; }
.code-panel.active { display: block; }

pre {
  background: #0a0d14;
  border: 1px solid #2d3748;
  border-top: none;
  border-radius: 0 0 6px 6px;
  padding: 16px;
  font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  font-size: 12.5px;
  line-height: 1.6;
  overflow-x: auto;
  color: #abb2bf;
  tab-size: 4;
  white-space: pre;
}
.before-panel pre { border-color: #5a2020; }
.after-panel  pre { border-color: #1a5a2a; }

/* ── Syntax highlighting ── */
.tok-kw      { color: #c792ea; }          /* keywords: class, public, return… */
.tok-type    { color: #82d4f0; }          /* built-in types: string, int, bool */
.tok-class   { color: #ffd580; }          /* PascalCase class names */
.tok-var     { color: #f07178; }          /* $variables */
.tok-str     { color: #c3e88d; }          /* 'strings' */
.tok-num     { color: #f78c6c; }          /* numbers */
.tok-comment { color: #4a6070; font-style: italic; } /* // comments */
.tok-tag     { color: #89ddff; }          /* <?php */
.tok-fn      { color: #82aaff; }          /* method calls */

/* ── Payments note ── */
.payments-note {
  background: #101828;
  border: 1px solid #1e3a5a;
  border-left: 3px solid #4a7fb5;
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 12px;
  color: #90cdf4;
  line-height: 1.5;
}
.payments-note strong { color: #63b3ed; }

/* ── Utility ── */
.hidden { display: none !important; }
.card.learned { opacity: .65; }
</style>
</head>
<body>

<header>
  <a href="index.html" style="font-size:12px;color:#4a5568;text-decoration:none;white-space:nowrap;flex-shrink:0" onmouseover="this.style.color='#90cdf4'" onmouseout="this.style.color='#4a5568'">← Index</a>
  <h1>GoF Patterns <span>Most Used</span></h1>

  <div class="filters">
    <button class="filter-btn on all" data-f="all" onclick="filter(this,'all')">All</button>
    <button class="filter-btn c"     data-f="Creational"  onclick="filter(this,'Creational')">Creational</button>
    <button class="filter-btn s"     data-f="Structural"  onclick="filter(this,'Structural')">Structural</button>
    <button class="filter-btn b"     data-f="Behavioral"  onclick="filter(this,'Behavioral')">Behavioral</button>
  </div>

  <div class="header-right">
    <input id="search" placeholder="Search patterns…" oninput="applyFilter()">
    <span id="progress"></span>
  </div>
</header>

<main id="main"></main>

<script>
const PATTERNS = [
  /* ── Creational ─────────────────────────────────────── */
  {
    cat: 'Creational', name: 'Singleton',
    intent: 'Ensure a class has only one instance and provide a global access point.',
    when: [
      'Exactly one object must coordinate actions across the system',
      'You need controlled access to a shared resource (config, logger, connection pool)',
      'Instantiation is expensive and should happen once',
    ],
    before: `<?php
// Multiple instances created everywhere — inconsistent state
$db1 = new DatabaseConnection();  // creates connection #1
$db2 = new DatabaseConnection();  // creates connection #2
// They don't share state — bugs waiting to happen`,
    after: `<?php
final class DatabaseConnection
{
    private static ?self $instance = null;

    private function __construct(
        private readonly \\PDO $pdo
    ) {}

    public static function getInstance(): self
    {
        if (self::$instance === null) {
            self::$instance = new self(
                new \\PDO(getenv('DATABASE_URL'))
            );
        }
        return self::$instance;
    }

    public function query(string $sql): \\PDOStatement
    {
        return $this->pdo->query($sql);
    }
}

// Always the same instance:
$conn = DatabaseConnection::getInstance();`,
    note: '<strong>Payments tip:</strong> Prefer dependency injection over singletons — they make testing hard. Use a DI container (Laravel\'s App::singleton) to get the same effect without the coupling.',
  },

  {
    cat: 'Creational', name: 'Factory Method',
    intent: 'Define an interface for creating objects, but let subclasses decide which class to instantiate.',
    when: [
      'The exact class to instantiate is decided at runtime',
      'Subclasses should control what objects they create',
      'You want to eliminate hard-coded class names scattered across the codebase',
    ],
    before: `<?php
// Hard-coded everywhere — adding a new PSP means editing multiple files
if ($type === 'stripe') {
    $gateway = new StripeGateway($config);
} elseif ($type === 'paypal') {
    $gateway = new PayPalGateway($config);
} elseif ($type === 'braintree') {
    $gateway = new BraintreeGateway($config);
}`,
    after: `<?php
interface GatewayFactory
{
    public function create(): PaymentGateway;
}

class StripeGatewayFactory implements GatewayFactory
{
    public function create(): PaymentGateway
    {
        return new StripeGateway(config('stripe'));
    }
}

class PayPalGatewayFactory implements GatewayFactory
{
    public function create(): PaymentGateway
    {
        return new PayPalGateway(config('paypal'));
    }
}

// Resolved from DI container — no if/else anywhere:
$gateway = $this->gatewayFactory->create();
$gateway->charge($payment);`,
    note: '<strong>Payments tip:</strong> New PSP = new factory class, zero changes to existing code. Register the factory in your DI container and swap it per environment (Stripe in prod, fake in tests).',
  },

  {
    cat: 'Creational', name: 'Builder',
    intent: 'Construct complex objects step by step, separating construction from representation.',
    when: [
      'An object requires many optional parameters (avoid telescoping constructors)',
      'You want to produce different representations using the same construction steps',
      'Construction must happen in a specific order with validation at the end',
    ],
    before: `<?php
// Telescoping constructor — unreadable and fragile
$payment = new Payment(
    $id,
    $amount,
    $currency,
    $method,
    null,         // what is this?
    true,         // and this?
    false,
    $idempotencyKey
);`,
    after: `<?php
$payment = Payment::builder()
    ->withId(PaymentId::generate())
    ->withAmount(Money::of(1000, 'USD'))
    ->withMethod($creditCard)
    ->withIdempotencyKey($key)
    ->withMetadata(['order_id' => '123'])
    ->build();  // validates all required fields here

class PaymentBuilder
{
    private ?Money $amount = null;
    private ?PaymentMethod $method = null;

    public function withAmount(Money $m): self
    {
        $this->amount = $m;
        return $this;
    }

    public function build(): Payment
    {
        if ($this->amount === null) {
            throw new \\DomainException('Amount is required');
        }
        return new Payment($this->amount, $this->method, ...);
    }
}`,
    note: '<strong>Payments tip:</strong> Use a builder for constructing complex Checkout or Invoice objects — optional fields like discounts, metadata, and tax details fit naturally without polluting the constructor.',
  },

  /* ── Structural ─────────────────────────────────────── */
  {
    cat: 'Structural', name: 'Adapter',
    intent: 'Convert the interface of a class into another interface that clients expect.',
    when: [
      'You want to use an existing class but its interface does not match what you need',
      'You\'re integrating a third-party library and want to protect your domain from it',
      'You need to make classes work together that otherwise couldn\'t due to incompatible interfaces',
    ],
    before: `<?php
// Domain code is tightly coupled to Stripe's types
use Stripe\\Charge;

class PaymentService
{
    public function process(Charge $charge): void
    {
        // Directly using Stripe's object — what if we switch PSPs?
        if ($charge->status === 'succeeded') {
            // ...
        }
        echo $charge->id;
    }
}`,
    after: `<?php
// Define your own interface
interface GatewayResponse
{
    public function isSuccess(): bool;
    public function getTransactionId(): string;
    public function getErrorMessage(): ?string;
}

// Adapter wraps Stripe's object
class StripeChargeAdapter implements GatewayResponse
{
    public function __construct(
        private readonly \\Stripe\\Charge $charge
    ) {}

    public function isSuccess(): bool
    {
        return $this->charge->status === 'succeeded';
    }

    public function getTransactionId(): string
    {
        return $this->charge->id;
    }

    public function getErrorMessage(): ?string
    {
        return $this->charge->failure_message;
    }
}

// Domain code never sees Stripe types:
$response = new StripeChargeAdapter($stripeCharge);
if ($response->isSuccess()) { ... }`,
    note: '<strong>Payments tip:</strong> Wrap every PSP response (Stripe, PayPal, Braintree) in your own GatewayResponse adapter. Switching PSPs only requires a new adapter — your domain is untouched.',
  },

  {
    cat: 'Structural', name: 'Decorator',
    intent: 'Attach additional responsibilities to an object dynamically without subclassing.',
    when: [
      'You need to add behavior to objects without affecting other instances of the same class',
      'Extension by subclassing would lead to an explosion of subclasses',
      'You want to combine behaviors in different ways at runtime',
    ],
    before: `<?php
// Subclass explosion: every combination needs its own class
class StripeGateway {}
class LoggedStripeGateway extends StripeGateway {}
class RetryableStripeGateway extends StripeGateway {}
class LoggedRetryableStripeGateway extends StripeGateway {}
// ...and the same for every other PSP`,
    after: `<?php
interface PaymentGateway
{
    public function charge(Money $amount): GatewayResponse;
}

class LoggingDecorator implements PaymentGateway
{
    public function __construct(
        private readonly PaymentGateway $inner
    ) {}

    public function charge(Money $amount): GatewayResponse
    {
        $this->logger->info('Charging', ['amount' => $amount]);
        $response = $this->inner->charge($amount);
        $this->logger->info('Response', ['success' => $response->isSuccess()]);
        return $response;
    }
}

class RetryDecorator implements PaymentGateway
{
    public function charge(Money $amount): GatewayResponse
    {
        for ($i = 0; $i < 3; $i++) {
            $r = $this->inner->charge($amount);
            if ($r->isSuccess()) return $r;
        }
        throw new GatewayException('All retries failed');
    }
}

// Compose behaviors at boot time:
$gateway = new LoggingDecorator(
    new RetryDecorator(
        new StripeGateway()
    )
);`,
    note: '<strong>Payments tip:</strong> Add logging, retry logic, and circuit-breaking to any gateway by wrapping it — no inheritance needed, swap decorators per environment.',
  },

  {
    cat: 'Structural', name: 'Facade',
    intent: 'Provide a simplified interface to a complex subsystem.',
    when: [
      'You want to provide a simple interface to a complex body of code',
      'Many clients depend on implementation details of a subsystem',
      'You want to layer your subsystem and define entry points for each layer',
    ],
    before: `<?php
// API controller knows too much — tightly coupled to 5 services
class CheckoutController
{
    public function checkout(Request $request): Response
    {
        $customer = $this->customerRepo->find($request->customerId);
        $method   = $this->methodService->getDefault($customer);
        $invoice  = $this->invoiceFactory->create($customer, $request->items);
        $tx       = $this->gateway->charge($method, $invoice->total());
        $this->notifier->sendReceipt($customer, $tx);
        $this->ledger->record($tx);

        return new Response($tx);
    }
}`,
    after: `<?php
// Facade hides all orchestration
class CheckoutFacade
{
    public function checkout(
        CustomerId $customerId,
        array $items
    ): CheckoutResult {
        $customer = $this->customerRepo->find($customerId);
        $method   = $this->methodService->getDefault($customer);
        $invoice  = $this->invoiceFactory->create($customer, $items);
        $tx       = $this->gateway->charge($method, $invoice->total());
        $this->notifier->sendReceipt($customer, $tx);
        $this->ledger->record($tx);

        return new CheckoutResult($tx, $invoice);
    }
}

// Controller is now clean:
class CheckoutController
{
    public function checkout(Request $request): Response
    {
        $result = $this->checkout->checkout(
            CustomerId::from($request->customerId),
            $request->items
        );
        return new Response($result);
    }
}`,
    note: '<strong>Payments tip:</strong> Expose a CheckoutFacade to your API layer — it orchestrates customer lookup, payment, invoice creation, and notifications. Controllers stay thin.',
  },

  /* ── Behavioral ─────────────────────────────────────── */
  {
    cat: 'Behavioral', name: 'Strategy',
    intent: 'Define a family of algorithms, encapsulate each one, and make them interchangeable at runtime.',
    when: [
      'You need to switch between different implementations of the same behavior',
      'You have a class with a large conditional that selects different algorithms',
      'You want to isolate algorithm logic from the code that uses it',
    ],
    before: `<?php
// Growing if/else — adding a new method means editing this class
public function calculateFee(string $method, Money $amount): Money
{
    if ($method === 'card') {
        return $amount->multiply(0.029)->add(Money::of(30, 'USD'));
    } elseif ($method === 'ach') {
        return $amount->multiply(0.008);
    } elseif ($method === 'crypto') {
        return Money::zero('USD');
    } elseif ($method === 'bnpl') {
        // ... more logic
    }
}`,
    after: `<?php
interface FeeStrategy
{
    public function calculate(Money $amount): Money;
}

class CardFeeStrategy implements FeeStrategy
{
    public function calculate(Money $amount): Money
    {
        // 2.9% + $0.30
        return $amount->multiply(0.029)
                      ->add(Money::of(30, 'USD'));
    }
}

class AchFeeStrategy implements FeeStrategy
{
    public function calculate(Money $amount): Money
    {
        return $amount->multiply(0.008); // 0.8%
    }
}

class FeeCalculator
{
    public function __construct(
        private readonly FeeStrategy $strategy
    ) {}

    public function calculate(Money $amount): Money
    {
        return $this->strategy->calculate($amount);
    }
}

// Inject the right strategy at runtime:
$calculator = new FeeCalculator(new CardFeeStrategy());
$fee = $calculator->calculate(Money::of(10000, 'USD'));`,
    note: '<strong>Payments tip:</strong> New payment method = new strategy class, zero changes to FeeCalculator. Works great for discount strategies, refund policies, and fraud scoring too.',
  },

  {
    cat: 'Behavioral', name: 'Observer',
    intent: 'Define a one-to-many dependency so that when one object changes state, all dependents are notified automatically.',
    when: [
      'A change in one object requires notifying an unknown number of other objects',
      'You want loose coupling between the subject and its observers',
      'This is the foundation of Domain Events in DDD',
    ],
    before: `<?php
// Payment directly calls every consumer — tightly coupled
class Payment
{
    public function capture(): void
    {
        $this->status = 'captured';

        // Must know about every downstream system:
        $this->mailer->sendReceipt($this);
        $this->analytics->trackCapture($this);
        $this->ledger->record($this);
        $this->inventory->release($this->orderId);
    }
}`,
    after: `<?php
// Payment raises an event — knows nothing about consumers
class Payment
{
    private array $events = [];

    public function capture(): void
    {
        $this->status = PaymentStatus::captured();
        $this->events[] = new PaymentCaptured(
            $this->id->toString(),
            $this->amount->amountInCents(),
            (string) $this->amount->currency()
        );
    }

    public function pullEvents(): array
    {
        $e = $this->events;
        $this->events = [];
        return $e;
    }
}

// Application layer publishes events after saving:
$payment->capture();
$this->repo->save($payment);
foreach ($payment->pullEvents() as $event) {
    $this->bus->publish($event);
}

// Subscribers register independently:
$bus->subscribe(PaymentCaptured::class, $receiptMailer);
$bus->subscribe(PaymentCaptured::class, $analyticsTracker);
$bus->subscribe(PaymentCaptured::class, $ledgerRecorder);`,
    note: '<strong>Payments tip:</strong> This is exactly how DDD Domain Events work. Payment raises PaymentCaptured — Notifications, Analytics, and Ledger subscribe independently. Adding a new consumer requires zero changes to Payment.',
  },

  {
    cat: 'Behavioral', name: 'Command',
    intent: 'Encapsulate a request as an object, enabling queuing, logging, and undoable operations.',
    when: [
      'You want to parameterize actions and pass them around',
      'You need queuing, scheduling, or delayed execution of operations',
      'You need to support undo/redo or an audit log',
    ],
    before: `<?php
// Direct calls — no audit trail, no undo, no async option
class PaymentController
{
    public function refund(string $paymentId, int $amount): void
    {
        $payment = $this->repo->find($paymentId);
        $payment->refund(Money::of($amount, 'USD'));
        $this->repo->save($payment);
        $this->mailer->sendRefundConfirmation($payment);
    }
}`,
    after: `<?php
// The command object
final class RefundPaymentCommand
{
    public function __construct(
        public readonly string $paymentId,
        public readonly int    $amountInCents,
        public readonly string $currency,
        public readonly string $reason,
    ) {}
}

// The handler
class RefundPaymentHandler
{
    public function handle(RefundPaymentCommand $cmd): void
    {
        $payment = $this->repo->find($cmd->paymentId);
        $payment->refund(
            Money::of($cmd->amountInCents, $cmd->currency),
            $cmd->reason
        );
        $this->repo->save($payment);
    }
}

// Controller is now just a dispatcher:
$this->bus->dispatch(new RefundPaymentCommand(
    paymentId: $request->paymentId,
    amountInCents: $request->amount,
    currency: 'USD',
    reason: $request->reason,
));`,
    note: '<strong>Payments tip:</strong> Dispatch RefundPaymentCommand to a queue — it can be retried, logged, replayed, and audited. Works perfectly with Laravel\'s job system or Symfony Messenger.',
  },

  {
    cat: 'Behavioral', name: 'State',
    intent: 'Allow an object to alter its behavior when its internal state changes — the object appears to change its class.',
    when: [
      'An object\'s behavior depends on its current state and must change at runtime',
      'You have large conditionals that check state before every operation',
      'You want to model a clear lifecycle with enforced valid transitions',
    ],
    before: `<?php
// Every method has a state check — grows unmanageably
class Payment
{
    public function capture(): void
    {
        if ($this->status === 'pending') {
            throw new \\DomainException('Must authorize first');
        }
        if ($this->status === 'captured') {
            throw new \\DomainException('Already captured');
        }
        if ($this->status === 'refunded') {
            throw new \\DomainException('Already refunded');
        }
        $this->status = 'captured';
    }
}`,
    after: `<?php

const STORAGE_KEY = 'atlas_patterns_v2';
let learned = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
let activeFilter = 'all';
let openCardId = null;

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...learned]));
}

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── Syntax highlighter ──────────────────────────────────────────
// Tokenizes strings/comments first (so inner content is not re-processed),
// then applies keyword/type/variable/class highlighting to the rest.
function highlight(raw) {
  const e = esc(raw);

  // Regex that matches: line comments, block comments, single-quoted strings, double-quoted strings
  const tokenRe = /(\/\/[^\n]*)|(\/\*[\s\S]*?\*\/)|(&#039;(?:[^&#]|&#(?!039;))*&#039;)|(&quot;(?:[^&]|&(?!quot;))*&quot;)|('(?:[^'\\]|\\.)*')|("(?:[^"\\]|\\.)*")/g;

  let result = '';
  let last = 0;
  let m;

  while ((m = tokenRe.exec(e)) !== null) {
    result += colourCode(e.slice(last, m.index));
    if (m[1] || m[2]) {
      result += `<span class="tok-comment">${m[0]}</span>`;
    } else {
      result += `<span class="tok-str">${m[0]}</span>`;
    }
    last = tokenRe.lastIndex;
  }
  result += colourCode(e.slice(last));
  return result;
}

function colourCode(s) {
  // Keywords — run first while string has no HTML yet
  const kw = /\b(class|interface|abstract|final|function|public|private|protected|static|new|return|if|else|elseif|foreach|for|throw|extends|implements|namespace|use|readonly|self|parent|null|true|false|void)\b/g;
  s = s.replace(kw, '<span class="tok-kw">$1</span>');

  // Built-in types
  const types = /\b(array|string|int|bool|float|mixed|object|iterable|never|callable)\b/g;
  s = s.replace(types, '<span class="tok-type">$1</span>');

  // Variables  $foo
  s = s.replace(/(\$[a-zA-Z_]\w*)/g, '<span class="tok-var">$1</span>');

  // Method calls  ->foo(  or  ::foo(
  s = s.replace(/((?:->|::))([a-z_]\w*)(\s*\()/g,
    '$1<span class="tok-fn">$2</span>$3');

  // PascalCase class names
  s = s.replace(/\b([A-Z][a-zA-Z0-9]+)\b/g, '<span class="tok-class">$1</span>');

  // Numbers
  s = s.replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="tok-num">$1</span>');

  // PHP open tag — LAST so its class=" attribute isn't caught by keyword regex above
  s = s.replace(/(&lt;\?php)/g, '<span class="tok-tag">$1</span>');

  return s;
}

function filter(btn, f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('on');
  });
  btn.classList.add('on');
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.card').forEach(card => {
    const matchCat = activeFilter === 'all' || card.dataset.cat === activeFilter;
    const matchQ   = !q || card.dataset.name.toLowerCase().includes(q) ||
                     card.dataset.intent.toLowerCase().includes(q);
    card.classList.toggle('hidden', !matchCat || !matchQ);
  });
  document.querySelectorAll('.section-label').forEach(sec => {
    const cards = [...sec.nextElementSibling.querySelectorAll('.card')];
    sec.style.display = cards.every(c => c.classList.contains('hidden')) ? 'none' : '';
    sec.nextElementSibling.style.display = sec.style.display;
  });
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  const body = document.getElementById('body-' + id);
  const isOpen = body.classList.contains('open');

  if (openCardId && openCardId !== id) {
    document.getElementById('body-' + openCardId)?.classList.remove('open');
    document.getElementById('card-' + openCardId)?.classList.remove('open');
  }

  body.classList.toggle('open', !isOpen);
  card.classList.toggle('open', !isOpen);
  openCardId = !isOpen ? id : null;
}

function switchTab(id, which) {
  document.getElementById('tab-before-' + id).classList.toggle('active-before', which === 'before');
  document.getElementById('tab-after-' + id).classList.toggle('active-after',  which === 'after');
  document.getElementById('panel-before-' + id).classList.toggle('active', which === 'before');
  document.getElementById('panel-after-' + id).classList.toggle('active', which === 'after');
}

function toggleLearned(id, e) {
  e.stopPropagation();
  if (learned.has(id)) learned.delete(id);
  else learned.add(id);
  save();
  document.getElementById('card-' + id).classList.toggle('learned', learned.has(id));
  document.getElementById('cb-' + id).checked = learned.has(id);
  updateProgress();
}

function updateProgress() {
  document.getElementById('progress').textContent =
    learned.size + ' / ' + PATTERNS.length + ' learned';
}

function dotColor(cat) {
  return cat === 'Creational' ? '#f6ad55' : cat === 'Structural' ? '#90cdf4' : '#b794f4';
}

function build() {
  const main = document.getElementById('main');
  const categories = ['Creational', 'Structural', 'Behavioral'];

  categories.forEach(cat => {
    const patterns = PATTERNS.filter(p => p.cat === cat);

    const label = document.createElement('div');
    label.className = 'section-label';
    label.textContent = cat + ' (' + patterns.length + ')';
    main.appendChild(label);

    const group = document.createElement('div');
    group.dataset.group = cat;
    main.appendChild(group);

    patterns.forEach((p, i) => {
      const id = cat.slice(0, 1).toLowerCase() + i;
      const isLearned = learned.has(id);

      const card = document.createElement('div');
      card.className = 'card' + (isLearned ? ' learned' : '');
      card.id = 'card-' + id;
      card.dataset.cat = cat;
      card.dataset.name = p.name;
      card.dataset.intent = p.intent;

      card.innerHTML = `
        <div class="card-head" onclick="toggleCard('${id}')">
          <div class="cat-dot" style="background:${dotColor(cat)}"></div>
          <div class="head-text">
            <div class="pattern-name">${p.name}</div>
            <div class="pattern-intent">${p.intent}</div>
          </div>
          <div class="head-right">
            <label class="learned-toggle" onclick="toggleLearned('${id}',event)">
              <input type="checkbox" id="cb-${id}" ${isLearned ? 'checked' : ''}> Learned
            </label>
            <span class="chevron">▾</span>
          </div>
        </div>
        <div class="card-body" id="body-${id}">
          <div class="section-head">When to use</div>
          <ul class="when-list">
            ${p.when.map(w => `<li>${w}</li>`).join('')}
          </ul>
          <div class="section-head" style="margin-bottom:8px">Code Example (PHP)</div>
          <div class="code-tabs">
            <div class="tab-btns">
              <button class="tab-btn active-before" id="tab-before-${id}" onclick="switchTab('${id}','before')">Before</button>
              <button class="tab-btn" id="tab-after-${id}" onclick="switchTab('${id}','after')">After</button>
            </div>
            <div class="code-panel before-panel active" id="panel-before-${id}">
              <pre>${highlight(p.before)}</pre>
            </div>
            <div class="code-panel after-panel" id="panel-after-${id}">
              <pre>${highlight(p.after)}</pre>
            </div>
          </div>
          <div class="payments-note">💳 ${p.note}</div>
        </div>
      `;
      group.appendChild(card);
    });
  });

  updateProgress();
}

build();
</script>
