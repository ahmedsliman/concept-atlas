<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept Atlas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}

/* Gate */
#gate{position:fixed;inset:0;background:#0f1117;display:flex;align-items:center;justify-content:center;z-index:100}
#gate-box{width:320px;text-align:center}
#gate-box h2{font-size:20px;font-weight:700;color:#fff;margin-bottom:6px}
#gate-box p{font-size:13px;color:#4a5568;margin-bottom:24px}
#gate-box input{width:100%;padding:10px 14px;background:#141824;border:1px solid #2d3748;border-radius:8px;color:#e2e8f0;font-size:14px;text-align:center;letter-spacing:2px;outline:none}
#gate-box input:focus{border-color:#4a7fb5}
#gate-box input.shake{animation:shake .3s ease}
#gate-box .hint{margin-top:10px;font-size:11px;color:#c05252;min-height:16px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* Content */
#content{display:none}
header{padding:48px 40px 32px;max-width:900px;margin:0 auto}
header h1{font-size:28px;font-weight:700;color:#fff;letter-spacing:-.5px}
header h1 span{color:#b794f4}
header p{margin-top:8px;font-size:14px;color:#718096;max-width:500px;line-height:1.6}

main{max-width:900px;margin:0 auto;padding:0 40px 60px}
.section{margin-bottom:40px}
.section-title{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#4a5568;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #1e2533}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.card{display:flex;flex-direction:column;border-radius:10px;border:1px solid #1e2533;background:#141824;padding:18px;text-decoration:none;color:inherit;transition:border-color .15s,background .15s;position:relative;overflow:hidden}
.card:hover{border-color:#553a7f;background:#161426}
.card-icon{font-size:22px;margin-bottom:10px;line-height:1}
.card-title{font-size:14px;font-weight:600;color:#e2e8f0;margin-bottom:5px}
.card-desc{font-size:12px;color:#718096;line-height:1.5;flex:1}
.badge{display:inline-block;margin-top:12px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:9px;letter-spacing:.3px;align-self:flex-start}
.badge-live{background:#1a3a2a;color:#68d391;border:1px solid #2a5a3a}
.card-tag{position:absolute;top:12px;right:12px;font-size:9px;color:#4a5568;font-weight:500;letter-spacing:.5px;text-transform:uppercase}

.empty{color:#4a5568;font-size:13px;padding:20px 0}
</style>
</head>
<body>

<div id="gate">
  <div id="gate-box">
    <h2>Concept <span style="color:#b794f4">Atlas</span></h2>
    <p>Private area</p>
    <input type="password" id="pwd" placeholder="Password" autofocus />
    <div class="hint" id="hint"></div>
  </div>
</div>

<div id="content">
  <header>
    <h1>Concept <span>Atlas</span> <span style="font-size:13px;color:#553a7f;font-weight:400">/ Private</span></h1>
    <p>Private learning artifacts — not linked from the public index.</p>
  </header>

  <main>

    <!-- Add sections + cards here as you generate private HTML files -->
    <!-- Example structure:

    <div class="section">
      <div class="section-title">Section Name</div>
      <div class="grid">

        <a class="card" href="your-file.html">
          <div class="card-tag">Tag</div>
          <div class="card-icon">🔒</div>
          <div class="card-title">Title</div>
          <div class="card-desc">Description.</div>
          <span class="badge badge-live">Live</span>
        </a>

      </div>
    </div>

    -->

    <div class="section">
      <div class="section-title">Refactoring</div>
      <div class="grid">

        <a class="card" href="mikado-graph.html">
          <div class="card-tag">Refactoring</div>
          <div class="card-icon">🌿</div>
          <div class="card-title">Mikado Graph Builder</div>
          <div class="card-desc">Visually map refactoring prerequisites as a tree. Add nodes, cycle through Todo → In Progress → Done, and track overall progress.</div>
          <span class="badge badge-live">Live</span>
        </a>

      </div>
    </div>

  </main>
</div>

<script>
const HASH = '757afe1663400ce9dc2d3e23dc8c13a4a654996e7de0c76845c7c4285134a326';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function check() {
  const val = document.getElementById('pwd').value;
  const hash = await sha256(val);
  if (hash === HASH) {
    sessionStorage.setItem('atlas_auth', '1');
    document.getElementById('gate').style.display = 'none';
    document.getElementById('content').style.display = 'block';
  } else {
    const input = document.getElementById('pwd');
    document.getElementById('hint').textContent = 'Incorrect password';
    input.classList.add('shake');
    input.value = '';
    setTimeout(() => { input.classList.remove('shake'); document.getElementById('hint').textContent = ''; }, 800);
  }
}

document.getElementById('pwd').addEventListener('keydown', e => {
  if (e.key === 'Enter') check();
});

// Skip gate if already authed this session
if (sessionStorage.getItem('atlas_auth') === '1') {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}
</script>
</body>
</html>
